services:
  payment-db:
    image: postgres:16.0-alpine
    container_name: payment-db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

volumes:
  payment-db-data: