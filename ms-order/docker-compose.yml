services:
  order-db:
    image: postgres:16.0-alpine
    container_name: order-db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

volumes:
  order-db-data: